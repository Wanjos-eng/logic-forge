name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: Logic Forge v__VERSION__
          releaseBody: |
            ## Instalação

            ### Windows

            Baixe o instalador NSIS `.exe` anexado à release e execute-o normalmente. O assistente instala em escopo de usuário e baixa o WebView2 quando necessário.

            ### Linux

            Baixe o arquivo `.AppImage` anexado à release, torne-o executável e abra o aplicativo:

            ```bash
            chmod +x Logic-Forge-*.AppImage
            ./Logic-Forge-*.AppImage
            ```

            ## Artefatos publicados

            - Windows: instalador NSIS `.exe`
            - Linux: aplicativo portátil `.AppImage`

            ## Observações

            - A release é criada automaticamente a partir de tags `vX.Y.Z`.
            - O corpo da release resume como instalar cada artefato.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: "[name]-[version]-[platform][setup][ext]"
          uploadUpdaterJson: false
          args: ${{ matrix.args }}